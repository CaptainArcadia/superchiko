<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Super Jump Adventure</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      gap: 8px;
      user-select: none;
    }
    #hud {
      color: #fff;
      font-size: 15px;
      background: rgba(0,0,0,0.85);
      padding: 6px 24px;
      border-radius: 6px;
      letter-spacing: 3px;
    }
    canvas {
      display: block;
      border: 3px solid #333;
      box-shadow: 0 0 40px #0055ff44;
      image-rendering: pixelated;
    }
    #bottom { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    #controls { color: #555; font-size: 11px; letter-spacing: 1px; }
  </style>
</head>
<body>
  <div id="hud">
    COIN: <span id="uiCoin">000</span>
    &nbsp;|&nbsp;
    LIFE: <span id="uiLife">3</span>
    &nbsp;|&nbsp;
    SCORE: <span id="uiScore">00000</span>
  </div>
  <canvas id="c" width="800" height="480"></canvas>
  <div id="bottom">
    <div id="controls">← → 移動 &nbsp;|&nbsp; ↑ / Space = ジャンプ（2段可・長押しで高く） &nbsp;|&nbsp; Shift = ダッシュ &nbsp;|&nbsp; ↓ = しゃがみ &nbsp;|&nbsp; 左Ctrl = レーザー &nbsp;|&nbsp; R = リスタート</div>
  </div>

<script>
'use strict';

// ================================================================
//  BGM / SE
//  ブラウザの自動再生ポリシーにより、最初のキー入力 or クリックで再生開始
// ================================================================
const bgm = new Audio('assets/bgm.mp3');
bgm.loop   = true;
bgm.volume = 0.5;

// 効果音：同じ音が重なっても鳴るよう cloneNode() で再生
const seJump    = new Audio('assets/jump.wav');
const seHitHurt = new Audio('assets/hitHurt.wav');
seJump.volume    = 0.7;
seHitHurt.volume = 0.7;

function playSE(src) {
  src.cloneNode().play().catch(() => {});
}

let bgmStarted = false;
function tryStartBGM() {
  if (bgmStarted) return;
  bgmStarted = true;
  bgm.play().catch(() => {}); // ポリシーで弾かれても無視
}
addEventListener('keydown',  tryStartBGM, { once: false });
addEventListener('pointerdown', tryStartBGM, { once: false });

// ================================================================
//  SPRITE IMAGES  (ちーこ用)
//  左向き:chi1  右向き:chi2  ジャンプ:chi3  しゃがみ:chi4
// ================================================================
const imgs = {};
['chi1', 'chi2', 'chi3', 'chi4', 'fura1', 'fura2', 'goji1', 'goji2'].forEach(name => {
  const img = new Image();
  img.src = `assets/${name}.png`;
  imgs[name] = img;
});

// ================================================================
//  ★ CHARACTER DEFINITIONS ★
//  キャラクターを追加・変更するにはここを編集してください。
//  draw(ctx, x, y, w, h, dir, tick) に描画処理を書くだけで差し替え可能。
//  dir: 1=右向き, -1=左向き
// ================================================================
const CHARACTERS = {

  chiiko: {
    name: 'ちーこ',
    speed: 4.5,
    jumpPower: 13.5,
    width: 36,    // 通常時のヒットボックス幅
    height: 48,   // 通常時のヒットボックス高さ
    crouchW: 42,  // しゃがみ時の幅
    crouchH: 28,  // しゃがみ時の高さ
    // pstate: 'stand' | 'walk' | 'jump' | 'crouch'
    draw(ctx, x, y, w, h, dir, t, pstate) {
      let img;
      if      (pstate === 'crouch') img = imgs.chi4;
      else if (pstate === 'jump')   img = imgs.chi3;
      else if (dir < 0)             img = imgs.chi1;
      else                          img = imgs.chi2;

      if (!img || !img.complete || !img.naturalWidth) {
        // 画像未ロード時フォールバック
        ctx.fillStyle = '#ff88cc';
        ctx.fillRect(x, y, w, h);
        return;
      }
      ctx.drawImage(img, x, y, w, h);
    },
  },

  // ── キャラクター追加テンプレート ──────────────────────────────
  // newchar: {
  //   name: '新キャラ',
  //   speed: 4,
  //   jumpPower: 13,
  //   width: 36,
  //   height: 48,
  //   crouchW: 42,   // しゃがみ対応する場合のみ追加
  //   crouchH: 28,   // しゃがみ対応する場合のみ追加
  //   // pstate: 'stand'|'walk'|'jump'|'crouch'
  //   draw(ctx, x, y, w, h, dir, t, pstate) {
  //     // ここに描画処理を書く
  //   },
  // },
};

// ★ デフォルトキャラクター
let curCharKey = 'chiiko';

// ================================================================
//  GAME CONSTANTS
// ================================================================
const CW       = 800;
const CH       = 480;
const GRAVITY  = 0.55;
const GND_Y    = 400;   // 地面の上端Y座標
const LEVEL_W  = 5400;  // レベル全体の幅

// ================================================================
//  GAME STATE
// ================================================================
let state      = 'playing'; // 'playing' | 'dead' | 'gameover' | 'win'
let lives      = 3;
let coins      = 0;
let score      = 0;
let tick       = 0;
let camX       = 0;
let laserReady = false;   // レーザー使用可能フラグ
let laser      = null;    // { x, y, h, timer } | null

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ================================================================
//  LEVEL DATA
// ================================================================
let platforms, enemies, coinItems, laserItems, goal, particles;

function buildLevel() {
  platforms  = [];
  enemies    = [];
  coinItems  = [];
  laserItems = [];
  particles  = [];

  // 地面セグメント [startX, endX]
  [
    [0,    1200],
    [1350, 2200],
    [2380, 3150],
    [3300, 4050],
    [4200, 4950],
    [5050, LEVEL_W + 100],
  ].forEach(([sx, ex]) => {
    platforms.push({ x: sx, y: GND_Y, w: ex - sx, h: 120, type: 'ground' });
  });

  // 足場プラットフォーム [x, y, w]
  [
    [160,  320, 100], [320,  275, 80],  [490,  330, 100], [650,  280, 80],
    [820,  315, 100], [980,  255, 80],  [1140, 325, 80],  [1270, 275, 100],
    [1440, 295, 80],  [1610, 245, 80],  [1760, 315, 100], [1930, 265, 80],
    [2090, 325, 80],  [2270, 285, 80],  [2460, 315, 100], [2620, 255, 80],
    [2770, 315, 80],  [2970, 275, 100], [3160, 325, 80],
    [3360, 275, 80],  [3520, 315, 100], [3680, 255, 80],  [3840, 315, 80],
    [4040, 285, 80],
    [4230, 315, 80],  [4390, 255, 100], [4540, 315, 80],  [4710, 280, 80],
    [4900, 315, 100],
    [5120, 315, 100], [5280, 265, 80],
  ].forEach(([x, y, w]) => {
    platforms.push({ x, y, w, h: 20, type: 'platform' });
  });

  // ？ブロック [x, y]  ※3個目(i===2, x=680)がレーザーブロック
  // 各ブロックはその真下の足場から48px（1キャラ分）上に配置
  [
    [210, 232], [360, 187], [680, 192], [1010, 167],
    [1300, 187], [1660, 157], [2010, 177], [2640, 167],
    [3010, 187], [3570, 205], [3870, 215], [4420, 167],
    [4750, 192], [5150, 185],
  ].forEach(([x, y], i) => {
    platforms.push({ x, y, w: 40, h: 40, type: 'qblock', hit: false,
                     laserBlock: i === 2 });
  });

  // 地上敵 & 足場敵 [x, groundY, dir]
  // 地面セグメントごとに均等配置 + 足場上にも追加
  [
    // セグメント1: [0, 1200]
    [ 250, GND_Y,  1], [ 450, GND_Y, -1], [ 650, GND_Y,  1],
    [ 860, GND_Y, -1], [1060, GND_Y,  1],
    // セグメント2: [1350, 2200]
    [1440, GND_Y, -1], [1620, GND_Y,  1], [1800, GND_Y, -1],
    [1990, GND_Y,  1], [2160, GND_Y, -1],
    // セグメント3: [2380, 3150]
    [2470, GND_Y,  1], [2650, GND_Y, -1], [2840, GND_Y,  1],
    [3020, GND_Y, -1], [3120, GND_Y,  1],
    // セグメント4: [3300, 4050]
    [3390, GND_Y, -1], [3570, GND_Y,  1], [3760, GND_Y, -1],
    [3950, GND_Y,  1],
    // セグメント5: [4200, 4950]
    [4280, GND_Y, -1], [4460, GND_Y,  1], [4650, GND_Y, -1],
    [4840, GND_Y,  1], [4920, GND_Y, -1],
    // セグメント6: [5050, 5400]
    [5110, GND_Y,  1], [5260, GND_Y, -1], [5370, GND_Y,  1],
    // 足場の上（レベル全体に散らす）
    [ 190, 320,  1], [ 510, 330, -1], [ 840, 315,  1],
    [1290, 275, -1], [1770, 315,  1], [1950, 265, -1],
    [2490, 315,  1], [2990, 275, -1],
    [3380, 275,  1], [3550, 315, -1],
    [4250, 315,  1], [4420, 255, -1],
    [4930, 315,  1], [5140, 315, -1],
  ].forEach(([ex, gy, dir]) => {
    enemies.push({ x: ex, y: gy - 30, vx: dir * 1.5, vy: 0,
                   w: 38, h: 30, alive: true, dTimer: 0, type: 'ground' });
  });

  // 浮遊する敵 [baseX, baseY, phaseOffset]
  // 上下左右にゆっくりフラフラ動く。重力・プラットフォーム衝突なし
  [
    [ 400, 280, 0.0], [ 750, 230, 1.3], [1050, 260, 2.6],
    [1380, 200, 0.8], [1700, 250, 2.1], [2000, 220, 3.4],
    [2300, 260, 1.0], [2700, 200, 2.3], [3000, 240, 0.5],
    [3400, 210, 1.8], [3750, 260, 3.1], [4100, 220, 0.3],
    [4450, 250, 2.0], [4800, 200, 1.5], [5150, 240, 3.0],
  ].forEach(([bx, by, phase], i) => {
    enemies.push({
      x: bx, y: by,
      vx: 0, vy: 0,
      w: 36, h: 54,
      alive: true, dTimer: 0,
      type: 'float',
      baseX: bx, baseY: by,
      phaseX: phase,
      phaseY: phase + 1.2,
      dir: 1,
    });
  });

  // コイン配置
  for (let x = 120; x < LEVEL_W - 200; x += 68) {
    if (Math.random() > 0.38) {
      coinItems.push({ x, y: GND_Y - 55 - Math.random() * 95, col: false });
    }
  }
  platforms.filter(p => p.type === 'platform').forEach(p => {
    for (let cx = p.x + 10; cx < p.x + p.w - 10; cx += 24) {
      coinItems.push({ x: cx, y: p.y - 28, col: false });
    }
  });

  goal = { x: LEVEL_W - 100, y: GND_Y - 160 };
}

// ================================================================
//  PLAYER
// ================================================================
let player;

function createPlayer() {
  const ch = CHARACTERS[curCharKey];
  return {
    x: 80, y: GND_Y - ch.height,
    vx: 0, vy: 0,
    w: ch.width, h: ch.height,
    onGround: false,
    dir: 1,
    invincible: 0,
    crouching: false,
    jumpsLeft: 2,       // 2段ジャンプ残り回数
    prevJump: false,    // ジャンプキー前フレーム状態
    dashTimer: 0,       // ダッシュ残りフレーム
    dashCooldown: 0,    // ダッシュ再使用クールダウン
    prevShift: false,   // Shiftキー前フレーム状態
  };
}

// ================================================================
//  INPUT
// ================================================================
const keys = {};
addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space' || e.code === 'ArrowDown' || e.code === 'ArrowUp' || e.code === 'ControlLeft') e.preventDefault();
});
addEventListener('keyup', e => { keys[e.code] = false; });

function jumpPressed() { return keys['ArrowUp'] || keys['Space']; }

// ================================================================
//  HELPERS
// ================================================================
function overlaps(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function updateHUD() {
  document.getElementById('uiCoin').textContent  = String(coins).padStart(3, '0');
  document.getElementById('uiLife').textContent  = String(lives);
  document.getElementById('uiScore').textContent = String(score).padStart(5, '0');
}

function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i) / n + Math.random() * 0.5;
    const speed = 2 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 30 + Math.random() * 20,
      color,
    });
  }
}

// ================================================================
//  PLATFORM COLLISION  (AABB push-out)
// ================================================================
function resolvePlayerPlatform(p) {
  if (!overlaps(player.x, player.y, player.w, player.h, p.x, p.y, p.w, p.h)) return;

  const prevBottom = player.y + player.h - player.vy;
  const prevTop    = player.y - player.vy;
  const prevRight  = player.x + player.w - player.vx;
  const prevLeft   = player.x - player.vx;

  if (player.vy >= 0 && prevBottom <= p.y + 6) {
    // 上から着地
    player.y = p.y - player.h;
    player.vy = 0;
    player.onGround = true;
    player.jumpsLeft = 2;   // 着地で2段ジャンプ回復
  } else if (player.vy < 0 && prevTop >= p.y + p.h - 6) {
    // 下から当たる
    player.y = p.y + p.h;
    player.vy = 2;
    if (p.type === 'qblock' && !p.hit) {
      p.hit = true;
      if (p.laserBlock) {
        // レーザーアイテム出現
        laserItems.push({ x: p.x + 12, y: p.y - 20, col: false, popVy: -6 });
        spawnParticles(p.x + 20, p.y, '#00eeff', 8);
      } else {
        // コイン出現（上に飛び出す演出）
        coinItems.push({ x: p.x + 12, y: p.y - 20, col: false, popVy: -6 });
        coins++; score += 100;
        updateHUD();
        spawnParticles(p.x + 20, p.y, '#ffd700', 6);
      }
    }
  } else if (player.vx > 0 && prevRight <= p.x + 6) {
    player.x = p.x - player.w;
    player.vx = 0;
  } else if (player.vx < 0 && prevLeft >= p.x + p.w - 6) {
    player.x = p.x + p.w;
    player.vx = 0;
  }
}

// ================================================================
//  GAME CONTROL
// ================================================================
function resetGame() {
  lives = 3; coins = 0; score = 0; tick = 0; camX = 0;
  laserReady = false; laser = null;
  state = 'playing';
  buildLevel();
  player = createPlayer();
  updateHUD();
}

function respawn() {
  state = 'playing';
  player = createPlayer();
  camX = 0;
  particles = [];
  laser = null;
}

// ================================================================
//  UPDATE
// ================================================================
function update() {
  if (state !== 'playing') {
    if (keys['KeyR']) { keys['KeyR'] = false; resetGame(); }
    // パーティクル更新は死亡演出でも続ける
    updateParticles();
    return;
  }

  tick++;
  const ch = CHARACTERS[curCharKey];

  // ── しゃがみ処理（onGroundは前フレームの値を使用）──
  if (ch.crouchW) {
    const wantCrouch = keys['ArrowDown'] && player.onGround;
    if (wantCrouch && !player.crouching) {
      player.crouching = true;
      const oldBottom = player.y + player.h;
      player.w = ch.crouchW;
      player.h = ch.crouchH;
      player.y = oldBottom - player.h;   // 足元の位置を維持
    } else if (!wantCrouch && player.crouching) {
      player.crouching = false;
      const oldBottom = player.y + player.h;
      player.w = ch.width;
      player.h = ch.height;
      player.y = oldBottom - player.h;
    }
  }

  // ── ダッシュ（Shift、クールダウン付き）──
  if (player.dashCooldown > 0) player.dashCooldown--;
  if (player.dashTimer > 0)    player.dashTimer--;
  const shiftDown = (keys['ShiftLeft'] || keys['ShiftRight']) && !player.prevShift;
  player.prevShift = !!(keys['ShiftLeft'] || keys['ShiftRight']);
  if (shiftDown && player.dashCooldown === 0 && !player.crouching) {
    player.dashTimer = 16;
    player.dashCooldown = 52;
    player.vx = player.dir * ch.speed * 2.4;
    spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#aaddff', 6);
  }

  // ── Player physics ──
  if (!player.crouching) {
    if (keys['ArrowLeft'] || keys['KeyA']) { player.vx -= 0.8; player.dir = -1; }
    if (keys['ArrowRight'] || keys['KeyD']) { player.vx += 0.8; player.dir = 1; }
  } else {
    player.vx *= 0.75; // しゃがみ中は素早く減速
  }
  player.vx *= 0.78;
  const maxSpd = player.dashTimer > 0 ? ch.speed * 2.2 : ch.speed;
  if (Math.abs(player.vx) > maxSpd) player.vx = Math.sign(player.vx) * maxSpd;

  // ── ジャンプ（エッジ検出 + 2段ジャンプ）──
  const jumpDown = jumpPressed() && !player.prevJump;
  player.prevJump = jumpPressed();
  if (jumpDown && !player.crouching) {
    if (player.onGround) {
      // 1段目（地上）
      player.vy = -ch.jumpPower;
      player.onGround = false;
      player.jumpsLeft = 1;
      playSE(seJump);
    } else if (player.jumpsLeft > 0) {
      // 2段目（空中）
      player.vy = -ch.jumpPower * 0.9;
      player.jumpsLeft--;
      spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#ffffff', 5);
      playSE(seJump);
    }
  }
  // 早めにボタンを離すと低いジャンプに
  if (!jumpPressed() && player.vy < -5) player.vy = -5;

  player.vy = Math.min(player.vy + GRAVITY, 22);
  player.x += player.vx;
  player.y += player.vy;
  player.onGround = false;

  if (player.x < 0) { player.x = 0; player.vx = 0; }

  for (const p of platforms) {
    resolvePlayerPlatform(p);
  }

  // 落下死
  if (player.y > CH + 120) {
    spawnParticles(player.x + player.w / 2, player.y, '#ff4444', 12);
    lives--;
    updateHUD();
    state = 'dead';
    if (lives <= 0) setTimeout(() => { state = 'gameover'; }, 1200);
    else             setTimeout(respawn, 1800);
    return;
  }

  // ── コイン収集 ──
  for (const c of coinItems) {
    if (c.col) continue;
    if (c.popVy !== undefined) {
      c.y += c.popVy;
      c.popVy += 0.5;
      if (c.popVy > 0) delete c.popVy;
    }
    if (overlaps(player.x, player.y, player.w, player.h,
                 c.x - 9, c.y - 9, 18, 18)) {
      c.col = true;
      coins++; score += 50;
      spawnParticles(c.x, c.y, '#ffd700', 5);
      updateHUD();
    }
  }

  // ── レーザーアイテム収集 ──
  for (const item of laserItems) {
    if (item.col) continue;
    if (item.popVy !== undefined) {
      item.y += item.popVy;
      item.popVy += 0.5;
      if (item.popVy > 0) delete item.popVy;
    }
    if (overlaps(player.x, player.y, player.w, player.h,
                 item.x - 12, item.y - 12, 24, 24)) {
      item.col = true;
      laserReady = true;
      spawnParticles(item.x, item.y, '#00eeff', 8);
    }
  }

  // ── レーザー発射（0キー、1回限り）──
  if (keys['ControlLeft'] && laserReady && !laser) {
    keys['ControlLeft'] = false;
    laserReady = false;
    const laserH = player.h * 2;
    laser = {
      x: player.x + player.w,
      y: player.y + player.h / 2 - laserH / 2,
      h: laserH,
      timer: 40,
    };
    const laserRight = camX + CW; // ビームは画面右端まで
    for (const e of enemies) {
      if (!e.alive) continue;
      // 画面外はスキップ
      const ex = e.x - camX;
      if (ex + e.w < 0 || ex > CW) continue;
      // レーザー矩形と敵の当たり判定
      if (overlaps(e.x, e.y, e.w, e.h,
                   laser.x, laser.y, laserRight - laser.x, laser.h)) {
        e.alive = false; e.dTimer = 22;
        score += 200;
        spawnParticles(e.x + e.w / 2, e.y + e.h / 2, '#ff8800', 8);
      }
    }
    updateHUD();
  }
  if (laser) { laser.timer--; if (laser.timer <= 0) laser = null; }

  // ── 敵の更新 ──
  if (player.invincible > 0) player.invincible--;

  for (const e of enemies) {
    if (!e.alive) { if (e.dTimer > 0) e.dTimer--; continue; }

    if (e.type === 'float') {
      // ── 浮遊敵：サイン波で上下左右にフラフラ移動 ──
      e.x   = e.baseX + Math.sin(tick * 0.018 + e.phaseX) * 68;
      e.y   = e.baseY + Math.sin(tick * 0.025 + e.phaseY) * 30;
      e.dir = Math.cos(tick * 0.018 + e.phaseX) >= 0 ? 1 : -1;
    } else {
      // ── 地上敵：重力・プラットフォーム衝突 ──
      e.x += e.vx;
      e.vy = Math.min(e.vy + GRAVITY, 20);
      e.y += e.vy;

      for (const p of platforms) {
        if (p.type === 'qblock') continue;
        if (!overlaps(e.x, e.y, e.w, e.h, p.x, p.y, p.w, p.h)) continue;
        const prevEB = e.y + e.h - e.vy;
        const prevEL = e.x - e.vx;
        const prevER = e.x + e.w - e.vx;
        if (e.vy >= 0 && prevEB <= p.y + 6) {
          e.y = p.y - e.h; e.vy = 0;
        } else if (e.vx > 0 && prevER <= p.x + 6) {
          e.x = p.x - e.w; e.vx *= -1;
        } else if (e.vx < 0 && prevEL >= p.x + p.w - 6) {
          e.x = p.x + p.w; e.vx *= -1;
        }
      }

      if (e.x < 0) { e.x = 0; e.vx = Math.abs(e.vx); }
      if (e.y > CH + 100) { e.alive = false; continue; }

      // 端検出：足元の先に地面がなければ向きを反転（ピット落下防止）
      if (e.vy === 0) {
        const frontX = e.vx > 0 ? e.x + e.w + 2 : e.x - 2;
        const footY  = e.y + e.h + 1;
        let edgeSafe = false;
        for (const p of platforms) {
          if (p.type === 'qblock') continue;
          if (frontX >= p.x && frontX <= p.x + p.w &&
              footY  >= p.y && footY  <= p.y + 12) {
            edgeSafe = true; break;
          }
        }
        if (!edgeSafe) e.vx *= -1;
      }
    }

    // ── プレイヤーとの衝突（地上・浮遊 共通）──
    if (overlaps(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
      const stomp = player.vy > 1 && (player.y + player.h) < e.y + 14;
      if (stomp) {
        e.alive = false; e.dTimer = 22;
        player.vy = -8;
        score += 200;
        updateHUD();
        playSE(seHitHurt);
        spawnParticles(e.x + e.w / 2, e.y + e.h / 2, '#8b4000', 8);
      } else if (player.invincible === 0) {
        lives--; updateHUD();
        player.invincible = 120;
        spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#ff4444', 8);
        if (lives <= 0) { state = 'gameover'; return; }
      }
    }
  }

  // ── ゴール判定 ──
  if (overlaps(player.x, player.y, player.w, player.h,
               goal.x, goal.y, 14, 160)) {
    score += 1000; updateHUD();
    state = 'win';
    spawnParticles(goal.x, goal.y + 80, '#ffd700', 20);
  }

  // ── カメラ ──
  const targetCam = Math.max(0, player.x - CW / 3);
  camX += (targetCam - camX) * 0.12;

  updateParticles();
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.3;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ================================================================
//  RENDER
// ================================================================
function drawBG() {
  // 空グラデーション
  const grad = ctx.createLinearGradient(0, 0, 0, CH);
  grad.addColorStop(0, '#4aa8e8');
  grad.addColorStop(1, '#c8eeff');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CW, CH);

  // 丘（視差 0.3）
  ctx.fillStyle = '#4cac4c';
  for (let i = 0; i < 7; i++) {
    const wx  = i * 350;
    const sx  = ((wx - camX * 0.3) % (7 * 350) + 7 * 350) % (7 * 350) - 175;
    ctx.beginPath();
    ctx.ellipse(sx + 175, GND_Y, 175, 90, 0, Math.PI, 0);
    ctx.fill();
  }
  ctx.fillStyle = '#3a9c3a';
  for (let i = 0; i < 7; i++) {
    const wx  = i * 300 + 150;
    const sx  = ((wx - camX * 0.3) % (7 * 300) + 7 * 300) % (7 * 300) - 150;
    ctx.beginPath();
    ctx.ellipse(sx + 150, GND_Y, 120, 65, 0, Math.PI, 0);
    ctx.fill();
  }

  // 雲（視差 0.15）
  ctx.fillStyle = '#fff';
  const cloudBase = [60, 220, 410, 590, 760];
  cloudBase.forEach(wx => {
    const sx = ((wx - camX * 0.15) % (CW + 240) + CW + 240) % (CW + 240) - 120;
    const r  = 28 + (wx % 22);
    const sy = 50 + (wx % 40);
    ctx.beginPath();
    ctx.arc(sx,       sy,       r,         0, Math.PI * 2);
    ctx.arc(sx + r,   sy + 5,   r * 0.7,   0, Math.PI * 2);
    ctx.arc(sx - r*0.7, sy + 5, r * 0.6,   0, Math.PI * 2);
    ctx.fill();
  });
}

function drawPlatform(p) {
  const sx = p.x - camX;
  if (sx + p.w < -10 || sx > CW + 10) return;

  if (p.type === 'ground') {
    ctx.fillStyle = '#4cba4c';
    ctx.fillRect(sx, p.y, p.w, 10);
    ctx.fillStyle = '#8b6040';
    ctx.fillRect(sx, p.y + 10, p.w, p.h - 10);
    ctx.fillStyle = '#7a5030';
    for (let tx = 0; tx < p.w; tx += 40) {
      ctx.fillRect(sx + tx, p.y + 14, 36, 2);
      ctx.fillRect(sx + tx + 20, p.y + 26, 36, 2);
    }
    // 草のジグザグ
    ctx.fillStyle = '#3a9a3a';
    for (let gx = sx; gx < sx + p.w; gx += 8) {
      ctx.fillRect(gx + 2, p.y - 3, 2, 5);
      ctx.fillRect(gx + 6, p.y - 1, 2, 3);
    }

  } else if (p.type === 'platform') {
    ctx.fillStyle = '#d4903a';
    ctx.fillRect(sx, p.y, p.w, p.h);
    ctx.fillStyle = '#b07020';
    ctx.fillRect(sx, p.y, p.w, 4);
    ctx.fillStyle = '#e8b050';
    for (let tx = 4; tx < p.w - 4; tx += 18) {
      ctx.fillRect(sx + tx, p.y + 5, 12, 2);
    }

  } else if (p.type === 'qblock') {
    const sx2 = sx, sy = p.y;
    if (p.hit) {
      ctx.fillStyle = '#b07a40';
      ctx.fillRect(sx2, sy, 40, 40);
      ctx.strokeStyle = '#885518';
      ctx.lineWidth = 2;
      ctx.strokeRect(sx2 + 1, sy + 1, 38, 38);
    } else {
      const pulse = 1 + Math.sin(tick * 0.09) * 0.06;
      ctx.save();
      ctx.translate(sx2 + 20, sy + 20);
      ctx.scale(pulse, pulse);
      ctx.fillStyle = '#f0b800';
      ctx.fillRect(-20, -20, 40, 40);
      ctx.fillStyle = '#c09000';
      ctx.fillRect(-18, -18, 36, 36);
      ctx.fillStyle = '#ffe040';
      ctx.fillRect(-18, -18, 36, 8);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 22px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('?', 0, 2);
      ctx.restore();
    }
  }
}

function drawCoins() {
  for (const c of coinItems) {
    if (c.col) continue;
    const sx = c.x - camX;
    if (sx < -20 || sx > CW + 20) continue;
    const bob = c.popVy !== undefined ? 0 : Math.sin(tick * 0.09 + c.x * 0.05) * 3;
    const sy = c.y + bob;

    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.arc(sx, sy, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffee88';
    ctx.beginPath();
    ctx.arc(sx - 2, sy - 2, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#c8a000';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(sx, sy, 8, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawEnemies() {
  for (const e of enemies) {
    if (!e.alive && e.dTimer <= 0) continue;
    const sx = e.x - camX;
    if (sx + e.w < -10 || sx > CW + 10) continue;

    if (!e.alive) {
      if (e.type !== 'float') {
        // 地上敵：ぺしゃんこ（スプライトを縦に潰して表示）
        const img = imgs.goji1;
        if (img && img.complete && img.naturalWidth) {
          ctx.drawImage(img, sx, e.y + e.h - 6, e.w, 6);
        } else {
          ctx.fillStyle = '#7a3000';
          ctx.beginPath();
          ctx.ellipse(sx + e.w / 2, e.y + e.h - 2, e.w / 2 + 3, 5, 0, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      // 浮遊敵は消滅のみ（パーティクルで演出済み）
      continue;
    }

    // ── 浮遊敵の描画 ──
    if (e.type === 'float') {
      const img = e.dir >= 0 ? imgs.fura1 : imgs.fura2;
      if (img && img.complete && img.naturalWidth) {
        // ゆっくり上下にホバーさせる追加ボブ
        const bob = Math.sin(tick * 0.06 + e.phaseY) * 2;
        ctx.drawImage(img, sx, e.y + bob, e.w, e.h);
      } else {
        ctx.fillStyle = '#88ccff';
        ctx.fillRect(sx, e.y, e.w, e.h);
      }
      continue;
    }

    // ── 地上敵のスプライト描画 ──
    const img = e.vx >= 0 ? imgs.goji1 : imgs.goji2;
    // 歩行ボブ（上下に小さく揺れる）
    const walkBob = Math.sin(tick * 0.28) * 1.5;
    if (img && img.complete && img.naturalWidth) {
      ctx.drawImage(img, sx, e.y + walkBob, e.w, e.h);
    } else {
      ctx.fillStyle = '#8b4000';
      ctx.fillRect(sx, e.y, e.w, e.h);
    }
  }
}

function drawGoal() {
  const sx = goal.x - camX;
  if (sx < -80 || sx > CW + 20) return;

  // 旗ポール
  ctx.fillStyle = '#bbb';
  ctx.fillRect(sx, goal.y, 8, 160);
  ctx.fillStyle = '#999';
  ctx.fillRect(sx + 2, goal.y, 4, 160);

  // 旗（波）
  ctx.fillStyle = '#22cc44';
  ctx.beginPath();
  ctx.moveTo(sx + 8, goal.y);
  for (let i = 0; i <= 12; i++) {
    const frac = i / 12;
    ctx.lineTo(sx + 8 + frac * 55,
               goal.y + frac * 30 + Math.sin(tick * 0.16 + frac * 3.5) * 7);
  }
  ctx.lineTo(sx + 8, goal.y + 30);
  ctx.closePath();
  ctx.fill();

  // 先端の球
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.arc(sx + 4, goal.y, 8, 0, Math.PI * 2);
  ctx.fill();
}

function drawPlayer() {
  if (state === 'dead') return;
  if (player.invincible > 0 && Math.floor(tick / 4) % 2 === 0) return;
  const ch = CHARACTERS[curCharKey];
  const pstate = player.crouching        ? 'crouch'
               : !player.onGround        ? 'jump'
               : Math.abs(player.vx) > 0.3 ? 'walk'
               : 'stand';
  ch.draw(ctx, player.x - camX, player.y, player.w, player.h, player.dir, tick, pstate);
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life / 50);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - camX - 3, p.y - 3, 6, 6);
  }
  ctx.globalAlpha = 1;
}

function drawLaserItems() {
  for (const item of laserItems) {
    if (item.col) continue;
    const sx = item.x - camX;
    if (sx < -20 || sx > CW + 20) continue;
    const bob = item.popVy !== undefined ? 0 : Math.sin(tick * 0.1 + item.x * 0.05) * 3;
    const sy = item.y + bob;
    ctx.save();
    // 外側グロー
    ctx.fillStyle = '#00eeff44';
    ctx.beginPath(); ctx.arc(sx, sy, 16, 0, Math.PI * 2); ctx.fill();
    // 本体
    ctx.fillStyle = '#00eeff';
    ctx.beginPath(); ctx.arc(sx, sy, 11, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#0088ff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(sx, sy, 11, 0, Math.PI * 2); ctx.stroke();
    // "L" ラベル
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('L', sx, sy);
    ctx.restore();
  }
}

function drawLaser() {
  if (!laser) return;
  const alpha = Math.min(1, laser.timer / 10);
  const sx = laser.x - camX;
  ctx.save();
  ctx.globalAlpha = alpha;
  // 外側グロー
  ctx.fillStyle = '#0044ff33';
  ctx.fillRect(sx - 4, laser.y - 12, CW + 20, laser.h + 24);
  // メインビーム（左から右へグラデーション）
  const grad = ctx.createLinearGradient(sx, 0, CW, 0);
  grad.addColorStop(0,    '#ffffff');
  grad.addColorStop(0.05, '#00eeff');
  grad.addColorStop(1,    '#0044ffaa');
  ctx.fillStyle = grad;
  ctx.fillRect(sx, laser.y, CW + 20, laser.h);
  ctx.restore();
}

function drawHUDExtras() {
  if (!laserReady) return;
  ctx.save();
  ctx.fillStyle = '#00eeff';
  ctx.shadowColor = '#0088ff'; ctx.shadowBlur = 8;
  ctx.font = 'bold 14px "Courier New"';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('LASER [Ctrl]', 8, 8);
  ctx.restore();
}

function drawOverlay() {
  const cx = CW / 2, cy = CH / 2;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';

  if (state === 'dead') {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, 0, CW, CH);
    ctx.font = 'bold 44px "Courier New"';
    ctx.fillStyle = '#ff4444';
    ctx.fillText('ミスした！', cx, cy - 20);
    ctx.font = '22px "Courier New"';
    ctx.fillStyle = '#fff';
    ctx.fillText(`残り ${lives} 機`, cx, cy + 22);
  } else if (state === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.78)';
    ctx.fillRect(0, 0, CW, CH);
    ctx.font = 'bold 56px "Courier New"';
    ctx.fillStyle = '#ff2222';
    ctx.fillText('GAME OVER', cx, cy - 30);
    ctx.font = '20px "Courier New"';
    ctx.fillStyle = '#ffcc00';
    ctx.fillText(`スコア: ${score}`, cx, cy + 20);
    ctx.fillStyle = '#888';
    ctx.fillText('R キーでリスタート', cx, cy + 56);
  } else if (state === 'win') {
    ctx.fillStyle = 'rgba(0,0,60,0.68)';
    ctx.fillRect(0, 0, CW, CH);
    ctx.font = 'bold 56px "Courier New"';
    ctx.fillStyle = '#ffd700';
    ctx.fillText('GOAL！！', cx, cy - 30);
    ctx.font = '20px "Courier New"';
    ctx.fillStyle = '#fff';
    ctx.fillText(`スコア: ${score}`, cx, cy + 20);
    ctx.fillStyle = '#888';
    ctx.fillText('R キーで再プレイ', cx, cy + 56);
  }
}

// ================================================================
//  GAME LOOP
// ================================================================
function gameLoop() {
  update();

  drawBG();
  for (const p of platforms) drawPlatform(p);
  drawCoins();
  drawLaserItems();
  drawEnemies();
  drawGoal();
  drawPlayer();
  drawLaser();
  drawParticles();
  drawHUDExtras();
  drawOverlay();

  requestAnimationFrame(gameLoop);
}

// ================================================================
//  INIT
// ================================================================
resetGame();
gameLoop();
</script>
